# Applies committed Prisma migrations after migration changes reach develop or main.

name: Prisma Database Migrations

on:
  workflow_dispatch:
  push:
    branches: [ "develop", "main" ]
    paths:
      - ".github/workflows/prisma-prod-migration.yml"
      - "prisma/schema.prisma"
      - "prisma/migrations/**"

permissions:
  contents: read

jobs:
  migrate-dev:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest

    concurrency:
      group: "db-migrate-development"
      cancel-in-progress: false

    environment: preview

    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8.15.5
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm exec prisma migrate deploy --schema prisma/schema.prisma

  migrate-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    concurrency:
      group: "db-migrate-production"
      cancel-in-progress: false

    environment: production

    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8.15.5
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm exec prisma migrate deploy --schema prisma/schema.prisma
